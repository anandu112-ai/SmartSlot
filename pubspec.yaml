name: smart_parking_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  liquid_swipe: ^3.1.0
  google_fonts: ^8.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  provider: ^6.1.5+1
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  google_places_flutter: ^2.1.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  firebase_storage: ^12.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/app_logo.png
