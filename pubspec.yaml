name: smart_parking_app
description: "A Flutter parking slot booking application with Firebase backend, real-time location tracking, and payment integration."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  cloud_firestore: ^4.14.0
  provider: ^6.0.0
  intl: ^0.19.0
  liquid_swipe: ^2.1.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.1
  geolocator: ^10.0.0
  url_launcher: ^6.2.0
  http: ^1.1.0
  image_picker: ^1.0.0
  firebase_storage: ^11.5.0
  flutter_stripe: ^10.0.0
  razorpay_flutter: ^1.3.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
